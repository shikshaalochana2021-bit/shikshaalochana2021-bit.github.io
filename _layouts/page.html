---
layout: default
---

<div class="page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="breadcrumb">
      <a href="{{ '/' | relative_url }}">Home</a>
      <span aria-hidden="true">›</span>
      <span>{{ page.title }}</span>
    </nav>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-hero-desc">{{ page.description }}</p>
    {% endif %}
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="content-body">
      {{ content }}
    </div>
  </div>
</section>
